<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Günaydın Sol Yanım 🐻❤️</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0f0c20;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            perspective: 1000px;
            cursor: pointer;
        }

        /* Uçuşan Arka Plan Kalpleri */
        .bg-heart {
            position: absolute;
            color: rgba(255, 105, 180, 0.4);
            font-size: 20px;
            animation: floatUp 6s linear infinite;
            pointer-events: none;
        }

        @keyframes floatUp {
            0% {
                transform: translateY(100vh) rotate(0deg) scale(0.5);
                opacity: 1;
            }
            100% {
                transform: translateY(-10vh) rotate(360deg) scale(1.5);
                opacity: 0;
            }
        }

        /* Ana Konteyner */
        .container {
            text-align: center;
            z-index: 10;
            background: rgba(255, 255, 255, 0.05);
            padding: 30px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            max-width: 90%;
            width: 450px;
            animation: fadeIn 1.5s ease-in-out;
        }

        /* Dinamik Renk Değiştiren ve Atan Kalp */
        .main-heart {
            font-size: 80px;
            position: relative;
            display: inline-block;
            animation: beat 1.2s infinite alternate, changeColor 8s infinite linear;
            filter: drop-shadow(0 0 20px #ff3385);
            margin-bottom: 20px;
            user-select: none;
        }

        .bear-inside {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 35px;
        }

        @keyframes beat {
            0% { transform: scale(1); }
            100% { transform: scale(1.15); }
        }

        @keyframes changeColor {
            0% { filter: drop-shadow(0 0 20px #ff3385) hue-rotate(0deg); }
            100% { filter: drop-shadow(0 0 20px #ff3385) hue-rotate(360deg); }
        }

        /* Yazı Alanları */
        h1 {
            color: #fff;
            font-size: 24px;
            margin-bottom: 15px;
            text-shadow: 0 0 10px #ff3385;
        }

        .message-box {
            color: #ffe6f2;
            font-size: 16px;
            line-height: 1.6;
            min-height: 120px;
            margin-bottom: 20px;
            text-align: left;
            border-left: 3px solid #ff3385;
            padding-left: 15px;
        }

        .love-quote {
            color: #ff99c8;
            font-style: italic;
            font-size: 14px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            padding-top: 15px;
            animation: pulseText 2s infinite alternate;
        }

        @keyframes pulseText {
            0% { opacity: 0.7; }
            100% { opacity: 1; text-shadow: 0 0 8px #ff99c8; }
        }

        /* Tıklama Patlama Efektleri */
        .particle {
            position: absolute;
            pointer-events: none;
            animation: explode 0.8s ease-out forwards;
            font-size: 24px;
        }

        @keyframes explode {
            0% {
                transform: translate(-50%, -50%) scale(1);
                opacity: 1;
            }
            100% {
                transform: translate(calc(-50% + var(--x)), calc(-50% + var(--y))) scale(0);
                opacity: 0;
            }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="main-heart">
            ❤️
            <div class="bear-inside">🐻</div>
        </div>
        <h1>Günaydın Dünyam 🥰</h1>
        <div class="message-box" id="typewriter"></div>
        <div class="love-quote">"Sen benim güne başlama sebebim, her sabah uyandığımda şükretme nedenimsin..."</div>
    </div>

    <script>
        // Daktilo Efektli Uzun Mesaj
        const message = "Yeni bir güne seninle başlamak, varlığını bilerek uyanmak dünyadaki en güzel duygu... Sen benim hayatıma doğan en parlak güneşsin. Bugünün de senin gibi tatlı, huzurlu ve musmutlu geçsin. Her anında yanındayım, kalbimin en özel yerindesisin. Günaydın ayı popcornum, günaydın her şeyim! 🐻❤️";
        
        let index = 0;
        function typeWriter() {
            if (index < message.length) {
                document.getElementById("typewriter").innerHTML += message.charAt(index);
                index++;
                setTimeout(typeWriter, 50); // Yazma hızı (milisaniye)
            }
        }

        // Sayfa yüklendiğinde yazıyı başlat
        window.onload = typeWriter;

        // Rastgele Arka Plan Kalpleri Oluşturma
        function createBgHeart() {
            const heart = document.createElement('div');
            heart.classList.add('bg-heart');
            heart.innerHTML = Math.random() > 0.5 ? '❤️' : '💖';
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.animationDuration = (Math.random() * 3 + 4) + 's';
            heart.style.fontSize = (Math.random() * 15 + 15) + 'px';
            document.body.appendChild(heart);

            setTimeout(() => {
                heart.remove();
            }, 7000);
        }
        setInterval(createBgHeart, 300);

        // Tıklayınca Ayıcık ve Kalp Patlama Efekti
        window.addEventListener('click', (e) => {
            const particles = ['🐻', '❤️', '✨', '💖', '🧸', '🌸'];
            
            for (let i = 0; i < 12; i++) {
                const p = document.createElement('div');
                p.classList.add('particle');
                p.innerHTML = particles[Math.floor(Math.random() * particles.length)];
                
                // Patlama yönü hesaplama
                const angle = Math.random() * Math.PI * 2;
                const velocity = Math.random() * 150 + 50;
                const x = Math.cos(angle) * velocity + 'px';
                const y = Math.sin(angle) * velocity + 'px';
                
                p.style.setProperty('--x', x);
                p.style.setProperty('--y', y);
                p.style.left = e.clientX + 'px';
                p.style.top = e.clientY + 'px';
                
                document.body.appendChild(p);
                
                setTimeout(() => {
                    p.remove();
                }, 800);
            }
        });
    </script>
</body>
</html>
